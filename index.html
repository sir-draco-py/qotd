<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kata Hari Ini</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --card: #fffef9;
      --ink: #1c1a17;
      --muted: #9a9488;
      --accent: #c0824a;
      --border: #e8e3db;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--ink);
    }
    .logo span { color: var(--accent); }

    .date-pill {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
      z-index: 1;
    }

    /* CATEGORY TABS */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tab {
      padding: 6px 18px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.25s;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* QUOTE CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      max-width: 680px;
      width: 100%;
      padding: 56px 60px;
      position: relative;
      box-shadow: 0 2px 24px rgba(0,0,0,0.04);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card .mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      color: var(--accent);
      opacity: 0.2;
      line-height: 0.6;
      position: absolute;
      top: 32px;
      left: 48px;
      user-select: none;
    }

    .category-badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 3.5vw, 2rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.6;
      color: var(--ink);
      margin-bottom: 32px;
    }

    .quote-author {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .quote-author::before { content: '— '; }

    /* ACTIONS */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: #a8703e; border-color: #a8703e; }
    .btn svg { width: 14px; height: 14px; }

    /* SAVED / FAVORITES */
    .saved-section {
      max-width: 680px;
      width: 100%;
      margin-top: 64px;
    }

    .saved-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .saved-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      font-weight: 400;
    }

    .saved-count {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .saved-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .saved-item {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      animation: fadeUp 0.3s ease both;
    }

    .saved-item-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--ink);
      line-height: 1.5;
      flex: 1;
    }

    .saved-item-author {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-top: 6px;
    }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: #c0392b; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.82rem;
      border: 1px dashed var(--border);
      letter-spacing: 0.04em;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: 2px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    @media (max-width: 600px) {
      header { padding: 20px 24px; }
      .card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Kata<span>.</span>Hari Ini</div>
  <div class="date-pill" id="todayDate"></div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" data-cat="all">Semua</button>
    <button class="tab" data-cat="motivasi">Motivasi</button>
    <button class="tab" data-cat="kehidupan">Kehidupan</button>
    <button class="tab" data-cat="persahabatan">Persahabatan</button>
  </div>

  <div class="card" id="quoteCard">
    <div class="mark">"</div>
    <div class="category-badge" id="quoteCat"></div>
    <div class="quote-text" id="quoteText"></div>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="nextQuote()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Quote Baru
    </button>
    <button class="btn" onclick="saveQuote()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      Simpan
    </button>
    <button class="btn" onclick="copyQuote()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Salin
    </button>
  </div>

  <div class="saved-section" id="savedSection">
    <div class="saved-header">
      <div class="saved-title">Quotes Tersimpan</div>
      <div class="saved-count" id="savedCount">0 quotes</div>
    </div>
    <div class="saved-list" id="savedList">
      <div class="empty-state">Belum ada quotes tersimpan.<br>Tekan "Simpan" untuk menyimpan quote favoritmu.</div>
    </div>
  </div>
</main>

<footer>Kata Hari Ini &nbsp;·&nbsp; Temukan inspirasi setiap hari</footer>

<div class="toast" id="toast"></div>

<script>
  const quotes = [
    { text: "Jangan hitung hari-harimu, buatlah hari-harimu berarti.", author: "Muhammad Ali", cat: "motivasi" },
    { text: "Keberhasilan bukanlah kebetulan. Ia adalah kerja keras, ketekunan, belajar, pengorbanan, dan cinta dari apa yang kamu lakukan.", author: "Pelé", cat: "motivasi" },
    { text: "Mulailah di mana kamu berada. Gunakan apa yang kamu punya. Lakukan apa yang kamu bisa.", author: "Arthur Ashe", cat: "motivasi" },
    { text: "The secret of getting ahead is getting started.", author: "Mark Twain", cat: "motivasi" },
    { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt", cat: "motivasi" },
    { text: "Hidup adalah apa yang terjadi ketika kamu sibuk membuat rencana lain.", author: "John Lennon", cat: "kehidupan" },
    { text: "Di akhir hari, bukan gelar yang kamu sandang yang penting, tetapi perbedaan yang kamu buat.", author: "Nelson Mandela", cat: "kehidupan" },
    { text: "Hal terpenting adalah menikmati hidupmu — untuk bahagia — itu yang paling penting.", author: "Audrey Hepburn", cat: "kehidupan" },
    { text: "In the end, it's not the years in your life that count. It's the life in your years.", author: "Abraham Lincoln", cat: "kehidupan" },
    { text: "Kehidupan ini adalah milikmu. Jadikanlah sesuatu yang layak untuk dikenang.", author: "Anonim", cat: "kehidupan" },
    { text: "Persahabatan sejati tidak berkurang oleh jarak maupun waktu.", author: "Anonim", cat: "persahabatan" },
    { text: "Seorang teman sejati adalah orang yang berjalan masuk ketika seluruh dunia berjalan keluar.", author: "Walter Winchell", cat: "persahabatan" },
    { text: "A real friend is one who walks in when the rest of the world walks out.", author: "Walter Winchell", cat: "persahabatan" },
    { text: "Kebahagiaan tumbuh ketika dibagikan bersama teman.", author: "Anonim", cat: "persahabatan" },
    { text: "Teman yang baik seperti bintang — kamu tidak selalu bisa melihatnya, tapi kamu tahu mereka selalu ada.", author: "Anonim", cat: "persahabatan" },
    { text: "Friends are the family we choose for ourselves.", author: "Edna Buchanan", cat: "persahabatan" },
    { text: "Jangan takut untuk bermimpi besar dan berani memulai dari yang kecil.", author: "Anonim", cat: "motivasi" },
    { text: "Kesulitan hari ini adalah kekuatan esok hari.", author: "Anonim", cat: "motivasi" },
    { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius", cat: "motivasi" },
    { text: "Hidup bukan soal menunggu badai berlalu, tapi belajar menari di tengah hujan.", author: "Anonim", cat: "kehidupan" },
  ];

  let activeCategory = 'all';
  let currentIndex = -1;
  let saved = JSON.parse(localStorage.getItem('kataHariIni_saved') || '[]');

  function getFiltered() {
    return activeCategory === 'all' ? quotes : quotes.filter(q => q.cat === activeCategory);
  }

  function showQuote(q) {
    const catLabels = { motivasi: 'Motivasi', kehidupan: 'Kehidupan', persahabatan: 'Persahabatan' };
    const card = document.getElementById('quoteCard');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'fadeUp 0.5s ease both';
    document.getElementById('quoteCat').textContent = catLabels[q.cat] || q.cat;
    document.getElementById('quoteText').textContent = q.text;
    document.getElementById('quoteAuthor').textContent = q.author;
  }

  function nextQuote() {
    const filtered = getFiltered();
    let idx;
    do { idx = Math.floor(Math.random() * filtered.length); } while (idx === currentIndex && filtered.length > 1);
    currentIndex = idx;
    showQuote(filtered[idx]);
  }

  function saveQuote() {
    const text = document.getElementById('quoteText').textContent;
    const author = document.getElementById('quoteAuthor').textContent;
    if (saved.some(s => s.text === text)) { showToast('Quote sudah tersimpan!'); return; }
    saved.unshift({ text, author });
    localStorage.setItem('kataHariIni_saved', JSON.stringify(saved));
    renderSaved();
    showToast('Quote berhasil disimpan ✓');
  }

  function copyQuote() {
    const text = document.getElementById('quoteText').textContent;
    const author = document.getElementById('quoteAuthor').textContent;
    navigator.clipboard.writeText(`"${text}" — ${author}`).then(() => showToast('Disalin ke clipboard ✓'));
  }

  function renderSaved() {
    const list = document.getElementById('savedList');
    const count = document.getElementById('savedCount');
    count.textContent = saved.length + ' quotes';
    if (saved.length === 0) {
      list.innerHTML = '<div class="empty-state">Belum ada quotes tersimpan.<br>Tekan "Simpan" untuk menyimpan quote favoritmu.</div>';
      return;
    }
    list.innerHTML = saved.map((s, i) => `
      <div class="saved-item">
        <div>
          <div class="saved-item-text">${s.text}</div>
          <div class="saved-item-author">${s.author.replace('— ', '')}</div>
        </div>
        <button class="remove-btn" onclick="removeQuote(${i})" title="Hapus">×</button>
      </div>
    `).join('');
  }

  function removeQuote(i) {
    saved.splice(i, 1);
    localStorage.setItem('kataHariIni_saved', JSON.stringify(saved));
    renderSaved();
    showToast('Quote dihapus');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // TABS
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      currentIndex = -1;
      nextQuote();
    });
  });

  // DATE
  const d = new Date();
  document.getElementById('todayDate').textContent = d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // INIT
  nextQuote();
  renderSaved();
</script>
</body>
</html>
